ci:
  autofix_commit_msg: |
    Autofix formatting from pre-commit hooks

  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false

default_language_version:
  python: python3

repos:
  # General sanity checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # 2. Python linting & formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.1
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  # 2.1: Jupyter support
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
      - id: nbqa-black
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.1.0
    hooks:
      - id: black-jupyter
        language_version: python3

  # 3. Dependency safety / lock file checks
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.5.4
    hooks:
      - id: uv-lock
        args: [--locked]
        stages: [push]   # still runs in pre-commit.ci

  # 4. Security over secrets (API keys, tokens, passwords)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  # 5: Scans dependencies for known vulnerabilities (CI safe mode)
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (lightweight)
        entry: python -m pip_audit -r requirements.txt
        language: python
        additional_dependencies: [pip-audit]
        pass_filenames: false
        stages: [push]

  # TODO: Docstring Formatter (docformatter) doesn't support Python 3.14, only previous versions
  # TODO: Maybe add pyright
